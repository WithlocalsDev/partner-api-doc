get:
  tags: [Supplier]
  operationId: getSupplier
  summary: Get supplier details
  description: |
    Returns the supplier's self-description.

    v1 surfaces:
      - `supplierName` — identifies the supplier.
      - `supportsIdempotencyKey` — currently `false`
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema: { $ref: "../components/schemas/Supplier.yaml" }
    "401": { $ref: "../components/responses/Unauthorized.yaml" }
