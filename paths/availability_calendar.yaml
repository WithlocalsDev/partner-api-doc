post:
  tags: [Availability]
  operationId: availabilityCalendar
  summary: Availability calendar
  description: |
    This endpoint returns a single object per day. 
    It's designed to be queried for large date ranges and the result is used to populate an availability calendar.

    Lighter than `/availability`: one entry per day with a coarse
    `AVAILABLE` / `SOLD_OUT` / `CLOSED` status, suitable for rendering a
    month grid.

    Possible errors: `BAD_REQUEST`, `UNAUTHORIZED`.
  requestBody:
    required: true
    content:
      application/json:
        schema: { $ref: "../components/schemas/AvailabilityRequest.yaml" }
        examples:
          golden:
            $ref: "../examples/availability-request.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema: { $ref: "../components/schemas/AvailabilityCalendar.yaml" }
    "400": { $ref: "../components/responses/BadRequest.yaml" }
    "401": { $ref: "../components/responses/Unauthorized.yaml" }
