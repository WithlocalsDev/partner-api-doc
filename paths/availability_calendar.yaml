post:
  tags: [Availability]
  operationId: availabilityCalendar
  summary: Availability calendar
  description: |
    Returns a single object per day across the requested date range.
    Each entry carries a coarse `AVAILABLE` / `SOLD_OUT` / `CLOSED` status,
    a remaining vacancy count, and the list of configured start times —
    enough to render a month grid with tooltips without a follow-up call.

    Possible errors: `BAD_REQUEST`, `UNAUTHORIZED`, `NOT_FOUND` (product
    unknown or not bookable).
  requestBody:
    required: true
    content:
      application/json:
        schema: { $ref: "../components/schemas/AvailabilityRequest.yaml" }
        examples:
          golden:
            $ref: "../examples/availability-request.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema: { $ref: "../components/schemas/AvailabilityCalendar.yaml" }
    "400": { $ref: "../components/responses/BadRequest.yaml" }
    "401": { $ref: "../components/responses/Unauthorized.yaml" }
    "404": { $ref: "../components/responses/NotFound.yaml" }
