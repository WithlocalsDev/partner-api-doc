post:
  tags: [Availability]
  operationId: checkAvailability
  summary: Available start times over a date range
  description: |
    Returns availability data for a given date range and product.
    
    Possible errors: `BAD_REQUEST` (range exceeds cap, invalid product),
    `UNAUTHORIZED`.
  requestBody:
    required: true
    content:
      application/json:
        schema: { $ref: "../components/schemas/AvailabilityRequest.yaml" }
        examples:
          golden:
            $ref: "../examples/availability-request.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema: { $ref: "../components/schemas/Availability.yaml" }
          examples:
            golden:
              $ref: "../examples/availability-response.yaml"
    "400": { $ref: "../components/responses/BadRequest.yaml" }
    "401": { $ref: "../components/responses/Unauthorized.yaml" }
