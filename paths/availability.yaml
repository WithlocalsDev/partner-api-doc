post:
  tags: [Availability]
  operationId: checkAvailability
  summary: Available start times over a date range
  description: |
    Returns slots with start time, capacity, and per-party-size price.

    **Performance note:** `localDateRange` length is capped server-side (the
    underlying agenda compute is the path that previously caused a worker OOM,
    resolved by backend release 3.80.0; range fan-out is now async and cached
    briefly).

    Possible errors: `BAD_REQUEST` (range exceeds cap, invalid product),
    `UNAUTHORIZED`.
  x-maps-to: "ExperienceAgendaPartnerRouter.fullFlattenedAgenda / startingTimesMap"
  requestBody:
    required: true
    content:
      application/json:
        schema: { $ref: "../components/schemas/AvailabilityRequest.yaml" }
        examples:
          golden:
            $ref: "../examples/availability-request.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: { $ref: "../components/schemas/AvailabilitySlot.yaml" }
          examples:
            golden:
              $ref: "../examples/availability-response.yaml"
    "400": { $ref: "../components/responses/BadRequest.yaml" }
    "401": { $ref: "../components/responses/Unauthorized.yaml" }
