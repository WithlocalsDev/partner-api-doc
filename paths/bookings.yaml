get:
  tags: [Bookings]
  operationId: listBookings
  summary: Bookings list
  description: |
    Returns bookings matching the supplied filters. Filters combine with
    `AND`.

    **At least one** of `partnerReference`, `supplierReference`, `date`, or
    the `fromDate` + `toDate` pair must be supplied — a request with no
    filters returns `400`.

    Use `date` for an exact day, or `fromDate` + `toDate` for a range —
    `date` is mutually exclusive with the range pair.

    Possible errors: `BAD_REQUEST`, `UNAUTHORIZED`.
  parameters:
    - name: partnerReference
      in: query
      required: false
      description: Partner's own booking id.
      schema: { type: string }
      example: "XYZ-001"
    - name: supplierReference
      in: query
      required: false
      description: Withlocals booking id (UUID).
      schema: { type: string, format: uuid }
    - name: date
      in: query
      required: false
      description: |
        Single booking date (`YYYY-MM-DD`). Mutually exclusive with
        `fromDate` / `toDate`.
      schema: { type: string, format: date }
      example: "2026-07-15"
    - name: fromDate
      in: query
      required: false
      description: Range start, inclusive. Pair with `toDate`.
      schema: { type: string, format: date }
      example: "2026-07-01"
    - name: toDate
      in: query
      required: false
      description: Range end, inclusive. Pair with `fromDate`.
      schema: { type: string, format: date }
      example: "2026-07-31"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: { $ref: "../components/schemas/Booking.yaml" }
    "400": { $ref: "../components/responses/BadRequest.yaml" }
    "401": { $ref: "../components/responses/Unauthorized.yaml" }

post:
  tags: [Bookings]
  operationId: createBooking
  summary: Create a confirmed booking
  description: |
    Creates a `CONFIRMED` booking. Use `Idempotency-Key` to make retries safe.

    Possible errors: `BAD_REQUEST`, `UNAUTHORIZED`, `CONFLICT` (slot no longer available).
  parameters:
    - $ref: "../components/parameters/IdempotencyKey.yaml"
  requestBody:
    required: true
    content:
      application/json:
        schema: { $ref: "../components/schemas/CreateBookingRequest.yaml" }
        examples:
          golden:
            $ref: "../examples/create-booking-request.yaml"
  responses:
    "201":
      description: Created (`CONFIRMED`)
      content:
        application/json:
          schema: { $ref: "../components/schemas/Booking.yaml" }
          examples:
            golden:
              $ref: "../examples/booking-confirmed.yaml"
    "400": { $ref: "../components/responses/BadRequest.yaml" }
    "401": { $ref: "../components/responses/Unauthorized.yaml" }
    "409": { $ref: "../components/responses/Conflict.yaml" }
