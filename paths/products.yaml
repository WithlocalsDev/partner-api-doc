get:
  tags: [Products]
  operationId: listProducts
  summary: List bookable products
  description: |
    Paginated list of bookable products.

    Possible errors: `BAD_REQUEST` (invalid pagination), `UNAUTHORIZED`.
  parameters:
    - $ref: "../components/parameters/Page.yaml"
    - $ref: "../components/parameters/PageSize.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema: { $ref: "../components/schemas/ProductPage.yaml" }
          examples:
            golden:
              $ref: "../examples/product-page.yaml"
    "400": { $ref: "../components/responses/BadRequest.yaml" }
    "401": { $ref: "../components/responses/Unauthorized.yaml" }
