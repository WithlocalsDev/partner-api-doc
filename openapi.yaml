openapi: 3.1.0
info:
  title: Withlocals Partner API
  version: 1.0.0
  description: |
    A single contract for OTA partners and other commercial integrations.
    Covers products, availability, and the create -> amend -> cancel booking
    lifecycle.
    
    `POST /bookings` creates a `CONFIRMED` booking.

  contact:
    name: Withlocals Partner Integrations
    email: partners@withlocals.com
  x-logo:
    url: ./assets/logo.svg
    altText: Withlocals
    href: https://www.withlocals.com
    backgroundColor: "#ffffff"

servers:
  - url: https://test-api.withlocals.com/v1/partner
    description: Production

security:
  - bearerAuth: []

tags:
  - name: Supplier
    description: Self-describing supplier metadata.
  - name: Products
    description: Bookable products.
  - name: Availability
    description: Availability calendar.
  - name: Bookings
    description: Reserve, confirm, amend, cancel, and read bookings.
  - name: Webhooks
    description: |
      Out-of-band events delivered by Withlocals to a partner-registered URL.
      Register at `PUT /webhook`. See the *Webhooks* section for the delivery
      contract and the events Withlocals sends.

paths:
  /:                                { $ref: "./paths/supplier.yaml" }
  /products:                        { $ref: "./paths/products.yaml" }
  /products/{productId}:            { $ref: "./paths/products_id.yaml" }
  /availability/calendar:           { $ref: "./paths/availability_calendar.yaml" }
  /bookings:                        { $ref: "./paths/bookings.yaml" }
  /bookings/{bookingId}:            { $ref: "./paths/bookings_id.yaml" }
  /webhook:                         { $ref: "./paths/webhook.yaml" }

webhooks:
  bookingCancelled:                 { $ref: "./webhooks/booking_cancelled.yaml" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Per-partner opaque API token issued by Withlocals. Send on every
        request as:

            Authorization: Bearer <token>
