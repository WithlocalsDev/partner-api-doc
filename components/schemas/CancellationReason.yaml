type: string
description: |
  Why a booking was cancelled. The applicable subset depends on who
  initiated the cancellation (the event `status`):

  **Guest-initiated** (`status: CANCELLEDBYGUEST`):

  | Value | Meaning |
  |---|---|
  | `MY_PLANS_CHANGED`     | My plans changed |
  | `FOUND_BETTER_OPTION`  | Found better option |
  | `HOST_ASKED_TO_CANCEL` | Host asked to cancel |
  | `HOST_NOT_RESPONDING`  | Host not responding |

  **Host-initiated** (`status: CANCELLEDBYHOST`):

  | Value | Meaning |
  |---|---|
  | `HEALTH_MATTER`                       | Health matter |
  | `TICKETS_UNAVAILABLE`                 | Tickets unavailable |
  | `KEY_LOCATION_CLOSED`                 | Key location closed |
  | `UNABLE_TO_ACCOMMODATE_GUEST_REQUEST` | Unable to accommodate guest request |
  | `SEVERE_WEATHER`                      | Severe weather |
  | `FORCE_MAJEURE`                       | Force majeure |
  | `REQUESTED_BY_THE_GUEST`              | Requested by the guest |
  | `SCHEDULING_CONFLICT`                 | Scheduling conflict |
  | `NO_LONGER_AVAILABLE`                 | No longer available |
  | `DONT_WANT_TO_HOST`                   | Don't want to host |

  **Catch-all** (any status): `OTHER`.
enum:
  - MY_PLANS_CHANGED
  - FOUND_BETTER_OPTION
  - HOST_ASKED_TO_CANCEL
  - HOST_NOT_RESPONDING
  - HEALTH_MATTER
  - TICKETS_UNAVAILABLE
  - KEY_LOCATION_CLOSED
  - UNABLE_TO_ACCOMMODATE_GUEST_REQUEST
  - SEVERE_WEATHER
  - FORCE_MAJEURE
  - REQUESTED_BY_THE_GUEST
  - SCHEDULING_CONFLICT
  - NO_LONGER_AVAILABLE
  - DONT_WANT_TO_HOST
  - OTHER
example: HEALTH_MATTER
