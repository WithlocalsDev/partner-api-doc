type: object
description: |
  Body of `PATCH /bookings/{bookingId}`. Any subset of fields may be supplied.
properties:
  date: { type: string, format: date }
  time:
    type: string
    pattern: "^[0-2][0-9]:[0-5][0-9]$"
  numberOfAdults: { type: integer, minimum: 1 }
  numberOfChildren: { type: integer, minimum: 0 }
