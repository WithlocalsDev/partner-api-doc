type: object
description: |
  A monetary amount in minor units.
required: [amount, currency]
properties:
  amount:
    type: integer
    description: Integer value in minor units (cents); e.g. `12000` = €120.00.
    example: 12000
  currency:
    type: string
    enum: [EUR]
    description: ISO-4217 currency code. Always `EUR` in v1.
    example: EUR
