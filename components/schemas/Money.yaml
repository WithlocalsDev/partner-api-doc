type: object
description: |
  Supplier price.
required: [amount, currency]
properties:
  amount:
    type: number
    description: Decimal value in major units (e.g. `120.00` = €120.00).
    example: 120.00
  currency:
    type: string
    enum: [EUR]
    description: ISO-4217 currency code. Always `EUR` in v1.
    example: EUR
