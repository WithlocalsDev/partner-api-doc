type: object
description: |
  Payload of the `booking.cancelled` webhook. Thin by design — partner
  refetches the full booking via `GET /bookings/{bookingId}` if needed.

  `status` is the **who** (the role that initiated the cancellation);
  `cancellationReason` is the **why** (the specific motivation).
required: [eventId, eventType, occurredAt, bookingId, status, cancellationReason]
properties:
  eventId:
    type: string
    format: uuid
    description: |
      Unique per delivery. Partners SHOULD dedupe on this to tolerate
      at-least-once delivery.
    example: "9c3b5d8e-1f4a-4c2b-8d6e-7f0a1b2c3d4e"
  eventType:
    type: string
    enum: [booking.cancelled]
    example: booking.cancelled
  occurredAt:
    type: string
    format: date-time
    description: When the cancellation happened.
    example: "2026-06-15T09:42:11Z"
  bookingId:
    type: string
    format: uuid
    description: Withlocals booking id. Refetch via `GET /bookings/{bookingId}` for full state.
    example: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
  status:
    type: string
    enum: [CANCELLEDBYGUEST, CANCELLEDBYHOST, CANCELLEDBYADMIN, HOSTNOSHOW]
    description: Who initiated the cancellation.
    example: CANCELLEDBYHOST
  cancellationReason: { $ref: "./CancellationReason.yaml" }
