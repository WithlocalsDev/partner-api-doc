type: object
description: |
  Webhook registration. A single URL receives all event types; partners
  dispatch by the `eventType` field in each delivered payload.

  The `secret` is returned **only on first registration** (the `201` response
  of `PUT /webhook`). Subsequent reads and updates exclude it — save it on
  receipt. To rotate, `DELETE /webhook` then `PUT /webhook` again.
required: [url]
properties:
  url:
    type: string
    format: uri
    description: HTTPS URL where webhook events are POSTed.
    example: "https://partner.example.com/withlocals/webhook"
  secret:
    type: string
    description: |
      HMAC-SHA256 signing secret. Used to verify `X-Withlocals-Signature` on
      delivered events. Returned only on first registration.
    example: "whsec_a1b2c3d4e5f6a7b8c9d0e1f2"
