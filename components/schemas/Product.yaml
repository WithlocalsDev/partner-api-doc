type: object
description: A bookable experience.
required: [id, title]
properties:
  id: { type: string, format: uuid }
  title: { type: string, example: "Hidden food gems of Amsterdam" }
  description: { type: string }
  prettyUrl:
    type: string
    description: Slug suitable for partner display URLs.
    example: "hidden-food-gems-of-amsterdam"
  area: { type: string, example: "Amsterdam" }
  countryCode:
    type: string
    pattern: '^[A-Z]{2}$'
    description: ISO-3166-1 alpha-2 country code (uppercase).
    example: "NL"
  instantConfirmation:
    type: boolean
    description: |
      When `true`, bookings on this product are confirmed immediately without
      host approval. `GET /products` only returns products with
      `instantConfirmation: true`, so partners will not see un-bookable items.
      The field is retained for forward compatibility with a future
      request-to-book flow.
    example: true
  durationMinutes:
    type: integer
    minimum: 0
    example: 180
  languages:
    type: array
    items: { type: string }
    description: ISO-639-1 codes the experience can be hosted in.
    example: ["en", "nl"]
  images:
    type: array
    items:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri }
        alt: { type: string }
  options:
    type: array
    description: Bookable variants of this product.
    items: { $ref: "./ProductOption.yaml" }
