type: object
description: |
  Request body for `PUT /webhooks`. Only `url` is accepted — the signing
  `secret` is generated by Withlocals and returned (once) in the `201`
  response, never supplied by the partner.
required: [url]
properties:
  url:
    type: string
    format: uri
    description: HTTPS URL where webhook events are POSTed.
    example: "https://partner.example.com/withlocals/webhook"
