type: object
description: Per-person price for a specific party size.
required: [guests, retailPrice, netPrice]
properties:
  guests:
    type: integer
    description: Party size this per-person price applies to.
    example: 2
  retailPrice:
    $ref: "./Money.yaml"
    description: |
      Per-person price the guest pays, including the service fee.
  netPrice:
    $ref: "./Money.yaml"
    description: |
      Per-person price the partner pays Withlocals, including the service fee,
      with the partner discount applied.
