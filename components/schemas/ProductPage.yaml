type: object
description: One page of `Product` results.
required: [items, page, pageSize, total]
properties:
  items:
    type: array
    items: { $ref: "./Product.yaml" }
  page:
    type: integer
    minimum: 1
    example: 1
  pageSize:
    type: integer
    minimum: 1
    example: 50
  total:
    type: integer
    minimum: 0
    example: 248
