type: object
description: Availability lookup for a single product over a date range.
required: [productId, localDateRange]
properties:
  productId: { type: string, format: uuid }
  localDateRange:
    type: object
    required: [from, to]
    properties:
      from: { type: string, format: date, example: "2026-07-15" }
      to:
        type: string
        format: date
        description: Range length is capped server-side (see operation description).
        example: "2026-07-21"
  numberOfGuests:
    type: integer
    minimum: 1
    description: Drives per-party-size pricing lookup.
    example: 2
